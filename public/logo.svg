<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80">
  <defs>
    <linearGradient id="logoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1f80"/>
      <stop offset="50%" style="stop-color:#2a4dff"/>
      <stop offset="100%" style="stop-color:#00a1f0"/>
    </linearGradient>
    <linearGradient id="logoAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4dc3ff"/>
      <stop offset="100%" style="stop-color:#00ffcc"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4dc3ff"/>
      <stop offset="40%" style="stop-color:#2a4dff"/>
      <stop offset="70%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#00a1f0"/>
    </linearGradient>
    <filter id="logoGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Icon -->
  <rect x="4" y="8" width="64" height="64" rx="16" fill="url(#logoBg)"/>
  <line x1="20" y1="8" x2="20" y2="72" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
  <line x1="36" y1="8" x2="36" y2="72" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
  <line x1="52" y1="8" x2="52" y2="72" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
  <line x1="4" y1="24" x2="68" y2="24" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
  <line x1="4" y1="40" x2="68" y2="40" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
  <line x1="4" y1="56" x2="68" y2="56" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
  <ellipse cx="36" cy="40" rx="22" ry="8" fill="none" stroke="url(#logoAccent)" stroke-width="1.2" opacity="0.3" transform="rotate(-25 36 40)"/>
  <text x="36" y="48" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="22" fill="white" text-anchor="middle" letter-spacing="-0.5" filter="url(#logoGlow)">DTE</text>
  <circle cx="36" cy="59" r="2" fill="url(#logoAccent)" opacity="0.6"/>
  <!-- Text -->
  <text x="84" y="36" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="24" fill="url(#textGrad)" letter-spacing="-0.5">Debate, Train, Evolve</text>
  <text x="84" y="56" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="12" fill="#9ca3af" letter-spacing="0.5">Self-Evolution of LLM Reasoning</text>
</svg>
